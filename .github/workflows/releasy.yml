name: C++ CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Проверка репозитория с подмодулями
      # Это САМЫЙ ВАЖНЫЙ ШАГ. Он скачает код вашего проекта и,
      # благодаря флагу 'submodules: true', также скачает код GoogleTest
      # в папку 'external/googletest'.
      - uses: actions/checkout@v4
        with:
          submodules: true 

      # Шаг 2: Установка зависимостей (нужно для сборки GoogleTest и CPACK)
      - name: Install dependencies for build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential debhelper dpkg-dev

      # Шаг 3: Настройка проекта с CMake
      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      # Шаг 4: Сборка, запуск тестов и создание пакета .deb
      - name: Build, Test and Package
        run: |
          cd build
          cmake --build . --config Release --target all package

      # Шаг 5: Загрузка собранного .deb файла как артефакта сборки
      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package # Имя артефакта, под которым файл будет доступен для скачивания
          path: build/tests-0.0.1-Linux.deb # Путь к файлу, который создал CPack
