name: C++ CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download GoogleTest manually
        run: |
          mkdir -p external/googletest
          cd external/googletest
          git init
          git remote add origin https://github.com/google/googletest.git
          git fetch --depth=1 origin main
          git checkout main

      - name: Install dependencies for build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential debhelper dpkg-dev

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build and Run Tests
        run: |
          cd build
          cmake --build . --config Release

      - name: Build .deb Package (Создаем пакет здесь!)
        run: |
          cd build
          cpack -C Release

      - name: Create Release (Создаем релиз на GitHub)
        id: create_release
        uses: actions/create-release@v4 # Используем новую версию действия!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.0 # Или любую другую версию, которую вы хотите выпустить
          release_name: Release v1.0.0
          draft: false
          prerelease: false

      - name: Upload Release Asset (Загружаем файл в созданный релиз)
        id: upload-release-asset-deb
        uses: actions/upload-release-asset@v4 # ОБЯЗАТЕЛЬНО v4!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          
          # ГЛАВНОЕ ИЗМЕНЕНИЕ: Имя файла должно СОВПАДАТЬ с тем, что создает CPack.
          # Если в CPack у вас версия 1.0.0, то здесь должно быть так же.
          asset_path: build/tests-1.0.0-Linux.deb 
          asset_name: tests-1.0.0-Linux.deb 
          asset_content_type: application/vnd.debian.binary-package
