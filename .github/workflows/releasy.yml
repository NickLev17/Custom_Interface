name: C++ CI and Release

# Триггер: запуск вручную из вкладки "Actions"
on:
  workflow_dispatch: 

jobs:
  build_and_package:
    name: 🏗️ Build and Package
    runs-on: ubuntu-latest
    outputs:
      package_path: ${{ steps.package.outputs.package_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг для CMake add_subdirectory (если вы используете этот метод в CMakeLists.txt)
      - name: Download GoogleTest manually
        run: |
          mkdir -p external/googletest
          cd external/googletest
          git init
          git remote add origin https://github.com/google/googletest.git
          git fetch --depth=1 origin main
          git checkout main

      - name: Install dependencies for build and CPack
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential debhelper dpkg-dev

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build and Package .deb file (ИСПОЛЬЗУЕМ НОВЫЙ СПОСОБ ВЫВОДА)
        id: package
        run: |
          cd build
          cmake --build . --config Release --target package
          # НОВОЕ: Записываем путь в файл $GITHUB_OUTPUT
          echo "package_path=$(pwd)/tests-0.0.1-Linux.deb" >> $GITHUB_OUTPUT


  create_release:
    name: 🚀 Create Release and Upload Asset
    needs: build_and_package # Ждем успешного завершения сборки!
    runs-on: ubuntu-latest

    steps:
      - name: Create Release (ИСПОЛЬЗУЕМ АКТУАЛЬНУЮ ВЕРСИЮ v4)
        id: create_release
        uses: actions/create-release@v4 # Теперь это работает, так как мы не в контейнере!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 'v0.0.1'
          release_name: Release v0.0.1
          draft: false
          prerelease: false

      - name: Upload Release Asset (.deb file) (ИСПОЛЬЗУЕМ АКТУАЛЬНУЮ ВЕРСИЮ v4)
        id: upload-release-asset-deb
        uses: actions/upload-release-asset@v4 # Теперь это работает!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          
          # Берем путь из задания сборки
          asset_path: ${{ needs.build_and_package.outputs.package_path }}
          
          asset_name: tests-0.0.1-Linux.deb 
          asset_content_type: application/vnd.debian.binary-package
