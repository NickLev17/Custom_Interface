name: C++ CI and Release

# Триггер: запуск вручную из вкладки "Actions"
on:
  workflow_dispatch: 

jobs:
  build_and_package:
    name: 🏗️ Build and Package
    runs-on: ubuntu-latest
    outputs:
      # Объявляем, что задание вернет переменную 'package_path'
      package_path: ${{ steps.package.outputs.package_path }} 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download GoogleTest manually (для CMake add_subdirectory)
        run: |
          mkdir -p external/googletest
          cd external/googletest
          git init
          git remote add origin https://github.com/google/googletest.git
          git fetch --depth=1 origin main
          git checkout main

      - name: Install dependencies for build and CPack
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential debhelper dpkg-dev

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build and Package .deb file (Используем новый метод set-output)
        id: package
        run: |
          cd build
          cmake --build . --config Release --target package
          # НОВОЕ: Записываем путь в файл, как требует GitHub
          echo "package_path=$(pwd)/tests-0.0.1-Linux.deb" >> $GITHUB_OUTPUT


  create_release:
    name: 🚀 Create Release and Upload Asset
    needs: build_and_package # Ждем успешного завершения сборки!
    runs-on: ubuntu-latest

    steps:
      - name: Create Release (Используем полный путь к действию)
        id: create_release
        uses: docker://ghcr.io/actions/create-release:latest # <-- ИСПРАВЛЕНО! Полный путь (Docker image)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 'v0.0.1'
          release_name: Release v0.0.1
          draft: false
          prerelease: false

      - name: Upload Release Asset (.deb file) (Используем полный путь)
        id: upload-release-asset-deb
        uses: docker://ghcr.io/actions/upload-release-asset:latest # <-- ИСПРАВЛЕНО! Полный путь (Docker image)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          
          # Берем путь из задания сборки (работает благодаря 'needs')
          asset_path: ${{ needs.build_and_package.outputs.package_path }}
          
          asset_name: tests-0.0.1-Linux.deb 
          asset_content_type: application/vnd.debian.binary-package
