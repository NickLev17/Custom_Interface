name: Create Release and Build Package

# Триггер: запускается вручную из вкладки "Actions" или при публикации тега
on:
  push:
    tags:
      - 'v*' # Например, при пуше тега v1.0.0
  workflow_dispatch: # Позволяет запустить вручную

jobs:
  # Задание 1: Собираем проект и создаем .deb пакет
  build_and_package:
    name: 🏗️ Build and Package
    runs-on: ubuntu-latest
    outputs:
      package_path: ${{ steps.package.outputs.package_path }}

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true # Качаем подмодули (если вы их используете)

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential debhelper dpkg-dev

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build and Package
        id: package
        run: |
          cd build
          cmake --build . --config Release --target package
          # Сохраняем путь к файлу для следующего задания
          echo "::set-output name=package_path::$(pwd)/tests-0.0.1-Linux.deb"

  # Задание 2: Создаем релиз и загружаем в него файл
  create_release:
    # Это задание зависит от успешного завершения первого!
    needs: build_and_package
    name: 🚀 Create Release and Upload Asset
    runs-on: ubuntu-latest

    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Имя тега берем из переменной, которую задает GitHub при пуше тега
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset (.deb file)
        id: upload-release-asset-deb
        uses: actions/upload-release-asset@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Берем ссылку для загрузки из шага создания релиза
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          # Берем путь к файлу из шага сборки (межзадательная связь)
          asset_path: ${{ needs.build_and_package.outputs.package_path }}
          asset_name: tests-0.0.1-Linux.deb
          asset_content_type: application/vnd.debian.binary-package
