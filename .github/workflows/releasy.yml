name: 'C++ CI'

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true # Важно для add_subdirectory

      - name: Install dependencies and download GoogleTest manually
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential debhelper dpkg-dev
          # Создаем папку и скачиваем код, чтобы add_subdirectory сработал
          mkdir -p external/googletest && cd external/googletest
          git init
          git remote add origin https://github.com/google/googletest.git
          git fetch --depth=1 origin main
          git checkout main

      - name: Configure project with CMake (in build folder)
        run: |
          mkdir -p build
          cd build
          cmake .. # Убраны неиспользуемые переменные PATCH_VERSION и WITH_BOOST_TEST

      - name: Build project (build all targets)
        run: |
          cd build
          cmake --build .

      - name: Run Google Tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Build package (создаем .deb)
        run: |
          cd build
          cpack -C Release # Явно вызываем упаковщик

      # --- НОВЫЕ ШАГИ ДЛЯ РЕЛИЗА ---
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1 # Использование v1 здесь допустимо и работает
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Используем номер запуска как уникальный тег
          tag_name: ${{ github.run_number }} 
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Release Asset (загружаем .deb в релиз)
        id: upload_release_asset
        uses: actions/upload-release-asset@v1 # Использование v1 здесь допустимо и работает
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          
          # --- ГЛАВНОЕ ИСПРАВЛЕНИЕ ---
          # Имя файла должно ТОЧНО совпадать с тем, что создал CPack.
          # Если вы исправили CMakeLists.txt как выше, то имя будет tests-1.0.0-Linux.deb.
          # Если вы НЕ исправляли CMake, то имя будет tests-0.0.1-Linux.deb.
          
          # ИСПРАВЛЕННЫЙ ВАРИАНТ (если вы НЕ меняли CMakeLists.txt):
          asset_path: build/tests-0.0.1-Linux.deb 
          
          # ВАРИАНТ (если вы ИСПРАВИЛИ CMakeLists.txt как я советовал выше):
          # asset_path: build/tests-1.0.0-Linux.deb 
          
          asset_name: tests-0.0.1-Linux.deb # Имя файла в релизе
