name: C++ CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Шаг: Проверка кода с инициализацией подмодулей
      - uses: actions/checkout@v4
        with:
          submodules: true # ВАЖНО: Это инициализирует ваш подмодуль googletest

      # 2. Шаг: Использование официального действия для CMake
      # Этот шаг сам скачает и настроит CMake.
      - uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31' # Указываем версию, которая у вас установлена локально

      # 3. Шаг: Настройка (Configure)
      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          # Используем флаг -DCMAKE_EXPORT_COMPILE_COMMANDS для удобства IDE
          cmake .. -DCMAKE_BUILD_TYPE=Release

      # 4. Шаг: Сборка (Build) и тесты (Test)
      - name: Build and Run Tests
        run: |
          cd build
          # Собираем все (включая тесты) и сразу их запускаем
          cmake --build . --config Release
          ctest --output-on-failure

      # 5. Шаг: Сборка пакета (Package)
      - name: Build .deb Package
        run: |
          cd build
          cmake --build . --target package --config Release

      # 6. Шаг: Поиск и публикация артефакта (вместо релиза)
      # Использовать Releases для .deb файлов не всегда удобно.
      # Лучше использовать встроенную систему "Artifacts".
      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/tests-0.0.1-Linux.deb
