name: C++ CI and Release

# Триггер: запуск вручную
on:
  workflow_dispatch: 

jobs:
  # Задание 1: Сборка проекта и создание .deb пакета
  build_and_package:
    name: 🏗️ Build and Package
    runs-on: ubuntu-latest
    outputs:
      package_path: ${{ steps.package.outputs.package_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download GoogleTest manually
        run: |
          mkdir -p external/googletest
          cd external/googletest
          git init
          git remote add origin https://github.com/google/googletest.git
          git fetch --depth=1 origin main
          git checkout main

      - name: Install dependencies for build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential debhelper dpkg-dev

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build and Package .deb file
        id: package
        run: |
          cd build
          cmake --build . --config Release --target package
          # Сохраняем путь к файлу для следующего задания
          echo "::set-output name=package_path::$(pwd)/tests-0.0.1-Linux.deb"


  # Задание 2: Создание релиза и загрузка актива (файла)
  create_release:
    name: 🚀 Create Release and Upload Asset
    needs: build_and_package # Ждем успешного завершения сборки!
    runs-on: ubuntu-latest

    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v4 # ИСПОЛЬЗУЕМ ВЕРСИЮ v4!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 'v0.0.1' # Тег для релиза
          release_name: Release v0.0.1
          draft: false
          prerelease: false

      - name: Upload Release Asset (.deb file)
        id: upload-release-asset-deb
        uses: actions/upload-release-asset@v4 # ИСПОЛЬЗУЕМ ВЕРСИЮ v4!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          
          # Берем путь к файлу из шага сборки (межзадательная связь)
          asset_path: ${{ needs.build_and_package.outputs.package_path }}
          
          asset_name: tests-0.0.1-Linux.deb # Имя файла в релизе
          asset_content_type: application/vnd.debian.binary-package
