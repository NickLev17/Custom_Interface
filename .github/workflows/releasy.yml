name: 'C++ CI'

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure project with CMake (in build folder)
        run: |
          mkdir -p build
          cd build
          cmake .. # Переменные PATCH_VERSION и WITH_BOOST_TEST убраны, так как они не используются в CMakeLists.txt

      - name: Build project (build all targets)
        run: cmake --build build

      - name: Run Google Tests
        run: ctest --test-dir build

      - name: Build package (создаем .deb)
        run: cmake --build build --target package

      - name: Find generated .deb files (для проверки)
        run: find build -name 'tests-0.0.1-Linux.deb' -ls

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Release Asset (загружаем .deb в релиз)
        id: upload_release_asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/tests-0.0.1-Linux.deb # Имя должно совпадать с тем, что задано в CPack!
          asset_name: tests-0.0.1-Linux.deb
          asset_content_type: application/vnd.debian.binary-package
