name: 'C++ CI'

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true

      - name: Install dependencies and download GoogleTest manually
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential debhelper dpkg-dev
          mkdir -p external/googletest && cd external/googletest
          git init
          git remote add origin https://github.com/google/googletest.git
          git fetch --depth=1 origin main
          git checkout main

      - name: Configure project with CMake (in build folder)
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build project (build all targets)
        run: |
          cd build
          cmake --build .

      - name: Run Google Tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Build package (создаем .deb)
        id: package_step # Добавляем ID к шагу, чтобы использовать его выходы
        run: |
          cd build
          cpack -C Release
          # ИСПРАВЛЕНИЕ 1: Используем новый метод вывода $GITHUB_OUTPUT
          echo "package_path=$(pwd)/tests-0.0.1-Linux.deb" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Release Asset (загружаем .deb в релиз)
        id: upload_release_asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Берем URL для загрузки из предыдущего шага
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          
          # Берем путь к файлу из шага сборки (ИСПРАВЛЕНИЕ 1)
          asset_path: ${{ steps.package_step.outputs.package_path }}
          
          asset_name: tests-0.0.1-Linux.deb
          
          # ИСПРАВЛЕНИЕ 2: Явно указываем тип контента для .deb файла
          asset_content_type: application/vnd.debian.binary-package
